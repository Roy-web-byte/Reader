<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;

}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 20px;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}

.title:hover {
  color: #007aff;
}

.title:active {
  color: #0056b3;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 25px;

}

#result {

  padding: 14px 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #fff;
  border: 1px solid #eee;
  transition: background 0.2s;
  cursor: pointer;
  user-select: none;
}

.sentence.active {
  background: #e1f5fe;
  border-color: #007aff;
}

.sentence.looping {
  background: #fff3e0;
  border-color: #ff9800;
}

.speaker {
  margin-right: 12px;
  font-size: 24px;
  user-select: none;
  flex-shrink: 0;
  margin-top: 2px;
}

}

  worse: 'bad', worst: 'bad', more: 'many', most: 'many', less: 'little', least: 'little',
  further: 'far', furthest: 'far'

function lemmatizeWord(word) {
  const lowerWord = word.toLowerCase();
  if (lowerWord.length < 4) return lowerWord;
  if (irregularWords[lowerWord]) return irregularWords[lowerWord];
  const excludeWords = ['is', 'was', 'has', 'does', 'goes', 'this', 'that', 'his', 'her', 'its', 'our', 'your', 'they', 'them', 'we', 'us', 'me', 'he', 'she', 'it'];
  if (excludeWords.includes(lowerWord)) return lowerWord;

  if (lowerWord.endsWith('ing') && lowerWord.length > 4) {
    const base = lowerWord.slice(0, -3);
    if (/[bcdfghjklmnpqrstvwxyz]{2}$/.test(base)) {
      const singleBase = base.slice(0, -1);
      if (ukPhoneticMap[singleBase]) return singleBase;
    }
    if (ukPhoneticMap[base + 'e']) return base + 'e';
    if (ukPhoneticMap[base]) return base;
  }
  if (lowerWord.endsWith('ed') && lowerWord.length > 4) {
    const base1 = lowerWord.slice(0, -2);
    const base2 = lowerWord.slice(0, -1);
    if (/[bcdfghjklmnpqrstvwxyz]{2}$/.test(base1)) {
      const singleBase = base1.slice(0, -1);
      if (ukPhoneticMap[singleBase]) return singleBase;
    }
    if (ukPhoneticMap[base2]) return base2;
    if (ukPhoneticMap[base1]) return base1;
  }
  if (lowerWord.endsWith('es') && lowerWord.length > 3) {
    const base = lowerWord.slice(0, -2);
    if (ukPhoneticMap[base]) return base;
  }
  if (lowerWord.endsWith('s') && lowerWord.length > 3) {
    const base = lowerWord.slice(0, -1);
    if (ukPhoneticMap[base]) return base;
  }
  return lowerWord;
}

function isValidUKIPA(phonetic) {
  if (!phonetic || typeof phonetic !== 'string') return false;
  if (/[A-Z0-9]/.test(phonetic)) return false;
  const ukIPAVowels = /[…£…ëΥêΟΠ ¨…î…ôe…¦i…Σ…ô äu äyΟΗ≈™…ê…€…û â]/;
  return ukIPAVowels.test(phonetic);
}

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    }
  });
  const preferredVoices = ['Samantha', 'Google US English', 'Microsoft David', 'Microsoft Zira'];
  let selectedIndex = -1;
  for (let name of preferredVoices) {
    const idx = allVoices.findIndex(v => v.name.includes(name) && v.lang.includes('en'));
    if (idx !== -1) { selectedIndex = idx; break; }
  }
  if (selectedIndex !== -1) voiceSelect.value = selectedIndex;
}

function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}

const englishAbbrs = ['Mr\\.', 'Mrs\\.', 'Ms\\.', 'Dr\\.', 'Prof\\.', 'U\\.S\\.A\\.', 'U\\.K\\.'];
const abbrPlaceholder = 'β½Ü';

// ========== ψÄêι΅çγ²ΙηΑÉφï¥οΦöφ•≠εèΞιÄΜηΨëδΦ‰ε¨•ψÄë ==========
goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (!text) return;
  wordCache.clear();

  let processedText = text;
  englishAbbrs.forEach(abbr => {
    const abbrRegex = new RegExp(`(\\b)${abbr}`, 'gi');
    const replacedAbbr = abbr.replace(/\\\./g, abbrPlaceholder);
    processedText = processedText.replace(abbrRegex, `$1${replacedAbbr}`);
  });

  // δΩ°φîΙοΦöδΜÖε€®εèΞεèΖψÄ¹ι½°εèΖψÄ¹φ³üεèΙεèΖεΛ³φ•≠εèΞοΦ¨γßΜιôΛδΚÜιÄ½εèΖψÄ¹εÜ£εèΖψÄ¹εàÜεèΖε£¨ιΓΩεèΖ
  const splitSymbols = /([.?!ψÄ²οΦüοΦ¹])/g; 
  const rawParts = processedText.split(splitSymbols);
  const segments = [];
  
  for (let i = 0; i < rawParts.length; i += 2) {
    let part = (rawParts[i] || '') + (rawParts[i + 1] || '');
    part = part.trim();
    if (part) segments.push(part);
  }

  const finalSegments = segments.map(seg => seg.replace(new RegExp(abbrPlaceholder, 'g'), '.'));
  fullTextSegments = finalSegments;
  renderResult(finalSegments);
});

// ... (δΜΞδΗ΄ renderResult, getUKPhonetic γ≠âφâÄφ€âεêéγΜ≠εäüηÉΫεù΅δΩùφ¨¹ 100% δΗçεè‰)
function getPureWord(word) {
  const normalizedWord = word.replace(/βÄô/g, "'");
  return normalizedWord.replace(/^[^a-zA-Z'-]+|[^a-zA-Z'-]+$/g, '').toLowerCase();
}

async function getUKPhonetic(word) {
  const pureWord = getPureWord(word);
  if (!pureWord) return '';
  if (wordCache.has(pureWord)) return wordCache.get(pureWord);
  if (ukPhoneticMap[pureWord]) {
    wordCache.set(pureWord, ukPhoneticMap[pureWord]);
    return ukPhoneticMap[pureWord];
  }
  const lemmaWord = lemmatizeWord(pureWord);
  if (lemmaWord !== pureWord && ukPhoneticMap[lemmaWord]) {
    wordCache.set(pureWord, ukPhoneticMap[lemmaWord]);
    return ukPhoneticMap[lemmaWord];
  }
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${lemmaWord}`);
    if (res.ok) {
      const data = await res.json();
      const phonetics = data[0]?.phonetics || [];
      let ukPhonetic = '';
      for (let p of phonetics) {
        if (p.text && p.audio && p.audio.includes('-uk-') && isValidUKIPA(p.text)) {
          ukPhonetic = p.text; break;
        }
      }
      if (ukPhonetic) {
        const finalPhonetic = ukPhonetic.startsWith('/') ? ukPhonetic : `/${ukPhonetic}/`;
        wordCache.set(pureWord, finalPhonetic);
        return finalPhonetic;
      }
    }
  } catch (err) {}
  wordCache.set(pureWord, '');
  return '';
}

function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach((seg, index) => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';
    sentenceDiv.dataset.index = index;

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = 'πüîä';

    const wordsDiv = document.createElement('div');
    wordsDiv.style.width = '100%';

    const words = seg.split(/\s+/).filter(Boolean);
    words.forEach(word => {
      const w = document.createElement('span');
      w.className = 'word';
      const wordText = document.createElement('span');
      wordText.className = 'word-text';
      wordText.textContent = word;
      const phoneticEl = document.createElement('span');
      phoneticEl.className = 'word-phonetic';
      w.appendChild(wordText);
      w.appendChild(phoneticEl);
      w.onclick = (e) => {
        e.stopPropagation();
        if (isReadingFullText) { stopSpeaking(); isReadingFullText = false; }
        if (loopSentenceIndex !== -1) { stopSpeaking(); loopSentenceIndex = -1; document.querySelectorAll('.sentence').forEach(s => s.classList.remove('looping')); }
        speakWord(word, w);
      };
      wordsDiv.appendChild(w);
      wordsDiv.appendChild(document.createTextNode(' '));
      getUKPhonetic(word).then(phonetic => { if (phonetic) phoneticEl.textContent = phonetic; });
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    sentenceDiv.onclick = () => {
      if (isReadingFullText) { stopSpeaking(); isReadingFullText = false; }
      if (loopSentenceIndex !== -1 && loopSentenceIndex !== index) { stopSpeaking(); loopSentenceIndex = -1; document.querySelectorAll('.sentence').forEach(s => s.classList.remove('looping')); }
      speakSentence(seg, sentenceDiv);
    };
    sentenceDiv.ondblclick = (e) => {
      e.stopPropagation();
      stopSpeaking();
      isReadingFullText = false;
      loopSentenceIndex = index;
      document.querySelectorAll('.sentence').forEach(s => s.classList.remove('looping'));
      sentenceDiv.classList.add('looping');
      loopSentence(seg, sentenceDiv);
    };
    result.appendChild(sentenceDiv);
  });
}

function loopSentence(text, sentenceEl) {
  if (loopSentenceIndex === -1) return;
  document.querySelectorAll('.sentence').forEach(s => s.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  sentenceEl.classList.add('active');
  u.onend = () => {
    sentenceEl.classList.remove('active');
    if (loopSentenceIndex !== -1) setTimeout(() => { if (loopSentenceIndex !== -1) loopSentence(text, sentenceEl); }, 500);
  };
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakFullText() {
  if (isReadingFullText) { stopSpeaking(); isReadingFullText = false; return; }
  if (loopSentenceIndex !== -1) { loopSentenceIndex = -1; document.querySelectorAll('.sentence').forEach(s => s.classList.remove('looping')); }
  if (fullTextSegments.length === 0) {
    goBtn.click();
    setTimeout(() => { startFullTextReading(); }, 100);
  } else { startFullTextReading(); }
}

function startFullTextReading() {
  if (fullTextSegments.length === 0) return;
  isReadingFullText = true;
  currentSentenceIndex = 0;
  readNextSentence();
}

function readNextSentence() {
  if (!isReadingFullText) return;
  if (currentSentenceIndex >= fullTextSegments.length) { isReadingFullText = false; return; }
  const text = fullTextSegments[currentSentenceIndex];
  const sentenceEls = document.querySelectorAll('.sentence');
  const currentEl = sentenceEls[currentSentenceIndex];
  if (!currentEl) { isReadingFullText = false; return; }
  document.querySelectorAll('.sentence').forEach(s => s.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  currentEl.classList.add('active');
  currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  u.onend = () => {
    currentEl.classList.remove('active');
    if (isReadingFullText) { currentSentenceIndex++; setTimeout(() => { if (isReadingFullText) readNextSentence(); }, 300); }
  };
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

titleBtn.addEventListener('click', () => { speakFullText(); });
function speakSentence(text, sentenceEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence').forEach(s => s.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}
function speakWord(word, wordEl) {
  stopSpeaking();
  document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
  wordEl.classList.add('active');
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
function stopSpeaking() { if (window.speechSynthesis.speaking) window.speechSynthesis.cancel(); }
</script>
</body>
</html>
