<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
  -webkit-appearance: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 25px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#result {
  padding-bottom: 50px;
}

.sentence {
  display: flex;
  align-items: flex-start;
  padding: 14px 12px;
  border-radius: 12px;
  margin-bottom: 12px;
  background: #fff;
  border: 1px solid #eee;
  transition: all 0.25s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.sentence.active {
  background: #f0f8ff;
  border-color: #007aff;
  box-shadow: 0 4px 12px rgba(0,122,255,0.1);
}

.speaker {
  margin-top: 6px;
  margin-right: 12px;
  font-size: 22px;
  user-select: none;
  flex-shrink: 0;
}

.words-wrapper {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 6px 4px;
  width: 100%;
}

.word-container {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.word-container.active {
  background: #ffeb3b;
}

.word-text {
  font-size: 18px;
  color: #1c1c1e;
  font-weight: 400;
  line-height: 1.2;
}

/* 高清且护眼的音标样式 */
.word-ipa {
  font-size: 13px;
  color: #8e8e93;
  font-family: -apple-system, sans-serif;
  min-height: 16px;
  margin-top: 2px;
  font-weight: 400;
  letter-spacing: 0.3px;
}
</style>
</head>

<body>
  <div class="title">English Reader</div>

  <select id="voiceSelect"></select>

  <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
  <button id="goBtn">Go</button>
  <div id="result"></div>

<script>
const inputArea = document.getElementById('inputArea');
const goBtn = document.getElementById('goBtn');
const result = document.getElementById('result');
const voiceSelect = document.getElementById('voiceSelect');
const titleEl = document.querySelector('.title');

let allVoices = [];
let currentUtterance = null;
let isReadingFullText = false; // 全文朗读状态标记
let fullTextQueue = [];
let currentSentenceIndex = 0;

// ————————— iPhone 防熄屏核心代码 —————————
let wakeLock = null;
async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('屏幕已保持常亮');
  } catch (err) {
    console.log('无法保持常亮:', err);
  }
}
document.addEventListener('visibilitychange', () => {
  if (wakeLock && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
window.addEventListener('load', requestWakeLock);
// ————————— 防熄屏代码结束 —————————

// ————————— 音标获取缓存与基础词库 —————————
const commonIPA = {
  "the":"/ðə/", "of":"/əv/", "to":"/tə/", "and":"/ænd/", "a":"/ə/", "in":"/ɪn/", "is":"/ɪz/", "it":"/ɪt/", 
  "you":"/ju/", "that":"/ðæt/", "he":"/hi/", "was":"/wʌz/", "for":"/fɔr/", "on":"/ɑn/", "are":"/ɑr/", 
  "with":"/wɪð/", "as":"/æz/", "i":"/aɪ/", "his":"/hɪz/", "they":"/ðeɪ/", "be":"/bi/", "at":"/æt/", 
  "one":"/wʌn/", "have":"/hæv/", "this":"/ðɪs/", "from":"/frʌm/", "or":"/ɔr/", "had":"/hæd/", "by":"/baɪ/", 
  "not":"/nɑt/", "word":"/wɜrd/", "but":"/bʌt/", "what":"/wʌt/", "some":"/sʌm/", "we":"/wi/", "can":"/kæn/", 
  "out":"/aʊt/", "other":"/ˈʌðər/", "were":"/wɜr/", "all":"/ɔl/", "there":"/ðɛr/", "when":"/wɛn/", 
  "up":"/ʌp/", "use":"/juz/", "your":"/jʊr/", "how":"/haʊ/", "said":"/sɛd/", "an":"/æn/", "each":"/itʃ/"
};
const ipaCache = { ...commonIPA };

async function getIPA(word) {
  if (!word) return '';
  if (ipaCache[word]) return ipaCache[word];

  // 若包含非英文字符（如中文），跳过请求，直接返回空格以对齐
  if (/[^\x00-\x7F]+/.test(word)) {
    ipaCache[word] = ' ';
    return ' ';
  }

  try {
    const res = await fetch(`https://api.datamuse.com/words?sp=${word}&ipa=1&max=1`);
    const data = await res.json();
    if (data && data.length > 0 && data[0].tags) {
      const ipaTag = data[0].tags.find(t => t.startsWith('ipa_'));
      if (ipaTag) {
        const ipa = `/${ipaTag.substring(4)}/`;
        ipaCache[word] = ipa;
        return ipa;
      }
    }
  } catch (e) {
    console.error('IPA fetch err:', e);
  }
  ipaCache[word] = ' ';
  return ' ';
}
// ————————— 音标引擎结束 —————————

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    }
  });
  const samanthaIndex = allVoices.findIndex(v =>
    v.name.includes('Samantha') && v.lang.includes('en-US')
  );
  if (samanthaIndex !== -1) {
    voiceSelect.value = samanthaIndex;
  }
}

function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ————————— 智能断句 —————————
goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (!text) return;
  const sentences = splitIntoRealSentences(text);
  renderResult(sentences);
});

function splitIntoRealSentences(text) {
  const s = text.replace(/\s+/g, ' ').trim();
  let t = s.replace(/(\d):(\d)/g, '$1⏱$2');
  const protectPatterns = [
    /\b([A-Z])\.([A-Z])\.([A-Z])\./gi,
    /\b([A-Z])\.([A-Z])\./gi,
    /\b[a-z]\.[a-z]\./gi,
    /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi
  ];
  protectPatterns.forEach(re => {
    t = t.replace(re, m => m.replace(/\./g, '•'));
  });
  const parts = t.split(/(?<=[.!?])\s+/);
  return parts.map(p =>
    p.replace(/⏱/g, ':').replace(/•/g, '.').trim()
  ).filter(Boolean);
}

// ————————— 全文朗读（逐句跟随高亮） —————————
titleEl.addEventListener('click', () => {
  const sentenceEls = document.querySelectorAll('.sentence');
  if (sentenceEls.length === 0) return;
  
  stopSpeaking(); 
  document.querySelectorAll('.sentence, .word-container').forEach(el => el.classList.remove('active'));

  isReadingFullText = true;
  fullTextQueue = Array.from(sentenceEls);
  currentSentenceIndex = 0;
  playNextInQueue();
});

function playNextInQueue() {
  if (!isReadingFullText || currentSentenceIndex >= fullTextQueue.length) {
    isReadingFullText = false;
    return;
  }

  const sentenceEl = fullTextQueue[currentSentenceIndex];
  const text = sentenceEl.getAttribute('data-raw-text');

  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;

  u.onstart = () => {
    document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
    sentenceEl.classList.add('active');
    // 自动平滑滚动，使当前朗读句子居中
    sentenceEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  u.onend = () => {
    sentenceEl.classList.remove('active');
    if (isReadingFullText) {
      currentSentenceIndex++;
      playNextInQueue();
    }
  };

  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

// ————————— 渲染与音标绑定 —————————
function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach(seg => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';
    sentenceDiv.setAttribute('data-raw-text', seg); 

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = '🔊';

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'words-wrapper';

    const words = seg.split(/\s+/).filter(Boolean);
    words.forEach(word => {
      // 提取纯字母用于查询音标，保留原符号用于显示和发音
      const cleanWord = word.replace(/[^\w']/g, '').toLowerCase();

      const wordContainer = document.createElement('span');
      wordContainer.className = 'word-container';

      const wordText = document.createElement('span');
      wordText.className = 'word-text';
      wordText.textContent = word;

      const wordIpa = document.createElement('span');
      wordIpa.className = 'word-ipa';
      wordIpa.textContent = '\u00A0'; // 使用不换行空格占位，防止高度塌陷

      wordContainer.appendChild(wordText);
      wordContainer.appendChild(wordIpa);

      wordContainer.onclick = (e) => {
        e.stopPropagation(); // 阻止触发句子的点击事件
        speakWord(word, wordContainer);
      };

      wordsDiv.appendChild(wordContainer);

      // 异步填充音标
      if (cleanWord) {
        getIPA(cleanWord).then(ipa => {
          wordIpa.textContent = ipa || '\u00A0';
        });
      }
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    sentenceDiv.onclick = () => speakSentence(seg, sentenceDiv);
    result.appendChild(sentenceDiv);
  });
}

// ————————— 单句与单字发音逻辑 —————————
function speakSentence(text, sentenceEl) {
  isReadingFullText = false; // 用户主动点击时打断全文朗读
  stopSpeaking();
  document.querySelectorAll('.sentence, .word-container').forEach(el => el.classList.remove('active'));
  
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakWord(word, wordContainer) {
  isReadingFullText = false; // 用户主动点击时打断全文朗读
  stopSpeaking();
  document.querySelectorAll('.sentence, .word-container').forEach(el => el.classList.remove('active'));
  
  wordContainer.classList.add('active');
  
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate = 0.9;
  
  u.onend = () => wordContainer.classList.remove('active');
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
  }
}
</script>
</body>
</html>
