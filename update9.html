<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>English Reader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2f2f7;--card:#fff;--primary:#0071e3;--phonetic:#1a56db;
  --text:#1c1c1e;--sub:#8e8e93;--border:rgba(0,0,0,.08);
  --shadow:0 2px 12px rgba(0,0,0,.08);--radius:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px;}
header{
  background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  padding:14px 20px;text-align:center;}
h1{
  font-size:21px;font-weight:700;letter-spacing:-.4px;cursor:pointer;
  user-select:none;display:inline-flex;align-items:center;gap:8px;
  transition:color .2s;}
h1:hover{color:var(--primary);}
h1 .play-badge{
  font-size:11px;background:var(--primary);color:#fff;padding:2px 7px;
  border-radius:20px;font-weight:600;transition:background .2s;}
h1.playing .play-badge{background:#ff3b30;}
.container{max-width:820px;margin:0 auto;padding:18px 14px;}
.input-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
textarea{
  width:100%;border:none;outline:none;font-size:16px;line-height:1.65;
  color:var(--text);resize:vertical;min-height:110px;font-family:inherit;
  background:transparent;}
textarea::placeholder{color:#aeaeb2;}
.ctl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-top:12px;padding-top:12px;border-top:1px solid var(--bg);}
.ctl-item{display:flex;align-items:center;gap:6px;}
.ctl-item label{font-size:12px;color:var(--sub);font-weight:600;white-space:nowrap;}
.ctl-item select{
  flex:1;border:1px solid #e5e5ea;border-radius:8px;padding:5px 8px;
  font-size:12px;background:#f9f9fb;color:var(--text);outline:none;cursor:pointer;}
.ctl-item input[type=range]{flex:1;accent-color:var(--primary);cursor:pointer;}
.ctl-item span{font-size:12px;color:var(--text);min-width:32px;text-align:right;font-weight:600;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
button{
  border:none;border-radius:12px;cursor:pointer;font-size:15px;
  font-weight:600;padding:11px 20px;transition:all .15s ease;font-family:inherit;}
#goBtn{background:var(--primary);color:#fff;flex:1;}
#goBtn:hover{background:#0077ed;}#goBtn:active{transform:scale(.97);}
#clearBtn{background:#e5e5ea;color:var(--text);padding:11px 16px;}
#clearBtn:hover{background:#d1d1d6;}
.loop-banner{
  text-align:center;font-size:13px;font-weight:600;color:#ff9500;
  background:#fff3cd;border-radius:20px;padding:7px 18px;
  margin:0 auto 12px;width:fit-content;
  box-shadow:0 2px 8px rgba(255,149,0,.2);}
.loop-banner.hidden{display:none;}
.status{text-align:center;font-size:13px;color:var(--sub);margin-bottom:10px;min-height:18px;}
.sentence-card{
  background:var(--card);border-radius:var(--radius);padding:14px 16px 18px;
  margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;
  user-select:none;transition:background .2s,box-shadow .2s;
  line-height:3.2;overflow-wrap:break-word;word-break:break-word;}
.sentence-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
.sentence-card.s-active{background:#e8f0fe;box-shadow:0 4px 18px rgba(0,113,227,.15);}
.sentence-card.s-loop{background:#fff8e7;box-shadow:0 4px 18px rgba(255,149,0,.2);}
.w-wrap{
  display:inline-flex;flex-direction:column;align-items:center;
  margin:0 2px 4px;border-radius:6px;padding:2px 3px;cursor:pointer;
  transition:background .15s;vertical-align:bottom;}
.w-wrap:hover{background:rgba(0,113,227,.07);}
.w-wrap.w-active{background:#cce3ff;}
.w-text{font-size:18px;font-weight:500;color:var(--text);line-height:1.2;}
.w-ipa{
  font-size:13.5px;color:var(--phonetic);line-height:1.15;
  font-family:'Lucida Sans Unicode','DejaVu Sans',Georgia,sans-serif;
  min-height:15px;letter-spacing:.02em;}
.punct{font-size:18px;color:var(--text);vertical-align:bottom;
  display:inline-block;line-height:3.2;}
@media(max-width:500px){
  .ctl-grid{grid-template-columns:1fr;}
  .w-text{font-size:16px;}.w-ipa{font-size:12px;}
  .sentence-card{padding:12px 12px 16px;line-height:3;}
}
</style>
</head>
<body>
<header>
  <h1 id="mainTitle">📖 English Reader <span class="play-badge">▶ All</span></h1>
</header>
<div class="container">
  <div class="input-card">
    <textarea id="textInput" rows="5"
      placeholder="Paste your English text here, then tap Go…&#10;&#10;Example: Mr. Smith went to Washington D.C. on Jan. 5th. He met Dr. Jones at 10:30 a.m. and they discussed U.S. trade policy. What did they decide?"></textarea>
    <div class="ctl-grid">
      <div class="ctl-item">
        <label for="voiceSelect">🔊 Voice</label>
        <select id="voiceSelect"><option>Loading…</option></select>
      </div>
      <div class="ctl-item">
        <label for="rateSlider">⚡ Speed</label>
        <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.9">
        <span id="rateDisp">0.9×</span>
      </div>
    </div>
    <div class="btn-row">
      <button id="goBtn">Go</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>
  <div id="loopBanner" class="loop-banner hidden">🔁 Loop Mode — tap elsewhere to stop</div>
  <p id="statusBar" class="status"></p>
  <div id="outputArea"></div>
</div>

// ═══════════════════════════════════════════
//  CACHE
// ═══════════════════════════════════════════
const phoneticCache = new Map();

function getPhonetic(word) {
  const lower = word.toLowerCase().replace(/['']/g, "'");
  if (phoneticCache.has(lower)) return phoneticCache.get(lower);
  let result = ukPhoneticMap[lower] || '';
  if (!result) {
    // Try stripped contractions/possessives
    const stripped = lower.replace(/'s$|'re$|'ve$|'ll$|'d$|'t$|'m$/,'');
    if (stripped !== lower && ukPhoneticMap[stripped]) result = ukPhoneticMap[stripped];
  }
  if (!result) {
    // Try removing trailing -s, -ed, -ing
    for (const sfx of ['ing','tion','sion','ness','ment','ful','less','ity','ly',
                        'ible','able','ous','ive','est','er','ed','es','s']) {
      if (lower.endsWith(sfx) && lower.length > sfx.length + 2) {
        const base = lower.slice(0, -sfx.length);
        if (ukPhoneticMap[base]) { result = ukPhoneticMap[base]; break; }
        if (ukPhoneticMap[base+'e']) { result = ukPhoneticMap[base+'e']; break; }
        if (lower.endsWith('ing') && base.length > 1) {
          const doubled = base.slice(0,-1);
          if (ukPhoneticMap[doubled]) { result = ukPhoneticMap[doubled]; break; }
        }
      }
    }
  }
  phoneticCache.set(lower, result);
  return result;
}

// ═══════════════════════════════════════════
//  SENTENCE SPLITTER  (精准断句)
// ═══════════════════════════════════════════
function splitSentences(raw) {
  const GUARD = '\uFFFD';  // replacement character as placeholder

  let t = raw.replace(/\r\n/g,' ').replace(/\r/g,' ').trim();

  // 1. Protect single-letter abbreviations like U.S.A. / U.K. / N.Y.
  t = t.replace(/(?<!\w)([A-Z])\.([A-Z])\.([A-Z])\.(?=[A-Z\b]|$|\s)/g,
                `$1${GUARD}$2${GUARD}$3${GUARD}`);
  t = t.replace(/(?<!\w)([A-Z])\.([A-Z])\.(?=\s|$|[^a-z])/g,
                `$1${GUARD}$2${GUARD}`);

  // 2. Protect known abbreviations (case-insensitive word boundary + dot)
  const abbrevs = [
    'Mr','Mrs','Ms','Miss','Msr','Dr','Prof','Rev','Sr','Jr',
    'Sgt','Cpl','Lt','Col','Maj','Gen','Adm','Capt','Pres','Gov','Sen','Rep',
    'Dept','Approx','Apt','Asst','Assoc','Ave','Blvd','Bldg','Ctr','Ste',
    'St','Rd','Hwy','Pkwy','Corp','Co','Inc','Ltd','Llc','Plc','Bros',
    'Jan','Feb','Mar','Apr','Jun','Jul','Aug','Sep','Sept','Oct','Nov','Dec',
    'Mon','Tue','Tues','Wed','Thu','Thur','Fri','Sat','Sun',
    'Vol','No','Nos','Fig','Ed','Eq','Ref','Ser','Op','Approx','Est',
    'Univ','Trans','Proc','Tech','Intl','Natl','Soc','Chem','Phys','Biol',
    'Vs','Etc','ie','eg','cf','al','seq','ibid','loc','inf','supra',
    'a\\.m','p\\.m',
  ];
  abbrevs.forEach(a => {
    try {
      const re = new RegExp(`\\b(${a})\\.(?=\\s|$|[A-Z\\d"])`, 'gi');
      t = t.replace(re, `$1${GUARD}`);
    } catch(_){}
  });

  // 3. Protect decimal numbers  3.14  1,000.50  etc.
  t = t.replace(/(\d)\.(\d)/g, `$1${GUARD}$2`);

  // 4. Protect ellipsis
  t = t.replace(/\.{2,}/g, m => m.replace(/\./g, GUARD));

  // 5. Split at sentence-ending punctuation followed by whitespace
  //    (also handles 。？！)
  const raw_parts = t.split(/(?<=[.?!。？！])\s+/);

  // 6. Restore GUARD → '.'
  return raw_parts
    .map(p => p.replace(new RegExp(GUARD,'g'),'.').trim())
    .filter(p => p.length > 0);
}

// ═══════════════════════════════════════════
//  TOKENISER
// ═══════════════════════════════════════════
function tokenize(sentence) {
  // Match word-like tokens (including apostrophe contractions & hyphens)
  // or individual non-space punctuation characters
  const re = /([A-Za-zÀ-ÖØ-öø-ÿ][A-Za-zÀ-ÖØ-öø-ÿ''\-]*)|([^\sA-Za-zÀ-ÖØ-öø-ÿ])/g;
  const tokens = [];
  let m;
  while ((m = re.exec(sentence)) !== null) {
    if (m[1]) tokens.push({type:'word', text:m[1]});
    else       tokens.push({type:'punct',text:m[2]});
  }
  return tokens;
}

// ═══════════════════════════════════════════
//  VOICE LOADER
// ═══════════════════════════════════════════
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  allVoices = voices;
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  const engVoices = voices.filter(v => /^en/i.test(v.lang));
  // Sort: en-GB first, then en-US, then others
  engVoices.sort((a,b) => {
    const rank = v => v.lang==='en-GB'?0:v.lang==='en-US'?1:2;
    return rank(a)-rank(b);
  });
  // Preferred high-quality voices at top
  const preferred = ['Daniel','Serena','Martha','Kate','Google UK English Male',
                     'Google UK English Female','Samantha','Google US English',
                     'Alex','Victoria','Karen','Moira'];
  const sorted = [
    ...engVoices.filter(v => preferred.some(p => v.name.includes(p))),
    ...engVoices.filter(v => !preferred.some(p => v.name.includes(p)))
  ];
  const seen = new Set();
  sorted.forEach(v => {
    if (seen.has(v.name)) return; seen.add(v.name);
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });
  if (!chosenVoice && sorted.length) {
    chosenVoice = sorted[0];
    sel.value = chosenVoice.name;
  }
}

// ═══════════════════════════════════════════
//  SPEECH HELPERS
// ═══════════════════════════════════════════
function makeUtterance(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.voice = chosenVoice;
  u.rate  = speechRate;
  u.lang  = chosenVoice ? chosenVoice.lang : 'en-GB';
  return u;
}

function speakText(text, onEnd) {
  speechSynthesis.cancel();
  if (!text.trim()) return;
  const u = makeUtterance(text);
  if (onEnd) u.onend = onEnd;
  // Workaround for Chrome bug (utterance cuts off after ~15s)
  u.onstart = () => { clearInterval(_keepAlive); _keepAlive = setInterval(()=>{ if(!speechSynthesis.speaking) clearInterval(_keepAlive); }, 5000); };
  speechSynthesis.speak(u);
}
let _keepAlive;

// ═══════════════════════════════════════════
//  PLAY LOGIC
// ═══════════════════════════════════════════
function stopAll() {
  speechSynthesis.cancel();
  clearInterval(_keepAlive);
  loopIdx = null;
  playAllActive = false;
  document.querySelectorAll('.sentence-card.s-active').forEach(c=>c.classList.remove('s-active'));
  document.querySelectorAll('.sentence-card.s-loop').forEach(c=>c.classList.remove('s-loop'));
  document.querySelectorAll('.w-wrap.w-active').forEach(w=>w.classList.remove('w-active'));
  document.getElementById('loopBanner').classList.add('hidden');
  document.getElementById('mainTitle').classList.remove('playing');
}

function playSentenceAt(idx) {
  stopAll();
  const cards = document.querySelectorAll('.sentence-card');
  if (!cards[idx]) return;
  cards[idx].classList.add('s-active');
  speakText(allSentences[idx], ()=>{ cards[idx].classList.remove('s-active'); });
}

function startLoop(idx) {
  stopAll();
  loopIdx = idx;
  document.getElementById('loopBanner').classList.remove('hidden');
  const cards = document.querySelectorAll('.sentence-card');
  if (cards[idx]) cards[idx].classList.add('s-loop');
  (function loop() {
    if (loopIdx !== idx) return;
    speechSynthesis.cancel();
    const u = makeUtterance(allSentences[idx]);
    u.onend = () => { if (loopIdx === idx) setTimeout(loop, 400); };
    speechSynthesis.speak(u);
  })();
}

function playAll() {
  stopAll();
  playAllActive = true;
  playAllIdx = 0;
  document.getElementById('mainTitle').classList.add('playing');
  (function next() {
    if (!playAllActive || playAllIdx >= allSentences.length) {
      document.getElementById('mainTitle').classList.remove('playing');
      playAllActive = false; return;
    }
    const idx = playAllIdx;
    const cards = document.querySelectorAll('.sentence-card');
    document.querySelectorAll('.sentence-card.s-active').forEach(c=>c.classList.remove('s-active'));
    if (cards[idx]) {
      cards[idx].classList.add('s-active');
      cards[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    const u = makeUtterance(allSentences[idx]);
    u.onend = () => {
      if (cards[idx]) cards[idx].classList.remove('s-active');
      playAllIdx++;
      if (playAllActive) setTimeout(next, 250);
    };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  })();
}

// ═══════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════
function render(sentList) {
  allSentences = sentList;
  const area = document.getElementById('outputArea');
  area.innerHTML = '';

  sentList.forEach((sent, sIdx) => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.dataset.idx = sIdx;

    const tokens = tokenize(sent);
    tokens.forEach(tok => {
      if (tok.type === 'word') {
        const wrap = document.createElement('span');
        wrap.className = 'w-wrap';
        wrap.title = tok.text;

        const wt = document.createElement('span');
        wt.className = 'w-text';
        wt.textContent = tok.text;

        const wp = document.createElement('span');
        wp.className = 'w-ipa';
        wp.textContent = getPhonetic(tok.text);

        wrap.appendChild(wt);
        wrap.appendChild(wp);
        card.appendChild(wrap);

        wrap.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.w-wrap.w-active').forEach(el=>el.classList.remove('w-active'));
          wrap.classList.add('w-active');
          speakText(tok.text);
        });
      } else {
        const ps = document.createElement('span');
        ps.className = 'punct';
        ps.textContent = tok.text;
        card.appendChild(ps);
      }
    });

    // Single/double click on sentence card
    const _state = {clicks:0, timer:null};
    card.addEventListener('click', e => {
      if (e.target.closest('.w-wrap')) return;
      _state.clicks++;
      if (_state.timer) clearTimeout(_state.timer);
      if (_state.clicks >= 2) {
        _state.clicks = 0;
        startLoop(sIdx);
        return;
      }
      _state.timer = setTimeout(() => {
        if (_state.clicks === 1) playSentenceAt(sIdx);
        _state.clicks = 0;
      }, 320);
    });

    area.appendChild(card);
  });
}

// ═══════════════════════════════════════════
//  WAKE LOCK
// ═══════════════════════════════════════════
async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLockHandle = await navigator.wakeLock.request('screen'); } catch(_) {}
  }
}
async function releaseWakeLock() {
  if (wakeLockHandle) { try { await wakeLockHandle.release(); } catch(_) {} wakeLockHandle = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && !wakeLockHandle) acquireWakeLock();
});

// ═══════════════════════════════════════════
//  CLICK ELSEWHERE → STOP LOOP
// ═══════════════════════════════════════════
document.addEventListener('click', e => {
  if (loopIdx !== null && !e.target.closest('.sentence-card')) stopAll();
});

window.addEventListener('DOMContentLoaded', () => {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 800);

  document.getElementById('voiceSelect').addEventListener('change', e => {
    chosenVoice = allVoices.find(v => v.name === e.target.value) || null;
  });

  document.getElementById('rateSlider').addEventListener('input', e => {
    speechRate = parseFloat(e.target.value);
    document.getElementById('rateDisp').textContent = speechRate.toFixed(2).replace(/\.?0+$/,'') + '×';
  });

  document.getElementById('goBtn').addEventListener('click', () => {
    const txt = document.getElementById('textInput').value.trim();
    if (!txt) return;
    stopAll();
    const sents = splitSentences(txt);
    if (!sents.length) return;
    render(sents);
    document.getElementById('statusBar').textContent =
      `${sents.length} sentence${sents.length!==1?'s':''} · tap a word to hear it · tap a sentence to read · double-tap to loop`;
    acquireWakeLock();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    stopAll();
    document.getElementById('textInput').value = '';
    document.getElementById('outputArea').innerHTML = '';
    document.getElementById('statusBar').textContent = '';
    releaseWakeLock();
  });

  document.getElementById('mainTitle').addEventListener('click', () => {
    if (!allSentences.length) return;
    if (playAllActive) { stopAll(); return; }
    playAll();
  });
});
</script>
</body>
</html>
