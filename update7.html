<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 6px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
}
.title.reading {
  color: #007aff;
}

.title-sub {
  text-align: center;
  font-size: 13px;
  color: #9aaabf;
  margin-bottom: 22px;
  letter-spacing: 0.02em;
  min-height: 18px;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 25px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#goBtn:active { opacity: 0.82; }

#result {
  font-size: 18px;
}

.sentence {
  display: flex;
  align-items: flex-start;
  padding: 12px 10px 8px;
  border-radius: 10px;
  margin-bottom: 12px;
  background: #fff;
  border: 1px solid #eee;
  transition: background 0.2s, border-color 0.2s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.sentence.active {
  background: #e8f4ff;
  border-color: #007aff;
}

.speaker {
  margin-right: 10px;
  font-size: 20px;
  user-select: none;
  flex-shrink: 0;
  padding-top: 5px;
  line-height: 1;
}

.words-container {
  display: flex;
  flex-wrap: wrap;
  flex: 1;
  align-items: flex-start;
}

.word-unit {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 0 3px;
  margin-bottom: 5px;
}

.word-text {
  font-size: 17px;
  cursor: pointer;
  padding: 1px 3px;
  border-radius: 4px;
  line-height: 1.5;
  color: #2c3e50;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
  word-break: break-word;
}

.word-text.active {
  background: #ffeb3b;
  font-weight: 600;
}

.word-ipa {
  font-size: 12px;
  color: #6e92c8;
  line-height: 1.4;
  margin-top: 1px;
  text-align: center;
  letter-spacing: 0.01em;
  min-height: 17px;
}
</style>
</head>

<body>
  <div class="title" id="titleEl">English Reader</div>
  <div class="title-sub" id="titleHint">▶ 点击标题朗读全文 &nbsp;·&nbsp; 再次点击停止</div>

  <select id="voiceSelect"></select>

  <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
  <button id="goBtn">Go</button>
  <div id="result"></div>

  'hello':'hɛˈloʊ','goodbye':'ˌɡʊdˈbaɪ','hi':'haɪ','hey':'heɪ',
  'oh':'oʊ','ah':'ɑː','wow':'waʊ','well':'wɛl',
  // Contractions
  "it's":'ɪts',"i'm":'aɪm',"i've":'aɪv',"i'll":'aɪl',"i'd":'aɪd',
  "you're":'jɔːr',"you've":'juːv',"you'll":'juːl',"you'd":'juːd',
  "he's":'hiːz',"she's":'ʃiːz',"we're":'wɪər',"we've":'wiːv',
  "we'll":'wiːl',"they're":'ðɛər',"they've":'ðeɪv',"they'll":'ðeɪl',
  "that's":'ðæts',"there's":'ðɛrz',"what's":'wʌts',
  "don't":'doʊnt',"doesn't":'ˈdʌzənt',"didn't":'ˈdɪdənt',
  "can't":'kænt',"won't":'woʊnt',"wouldn't":'ˈwʊdənt',
  "shouldn't":'ˈʃʊdənt',"couldn't":'ˈkʊdənt',"haven't":'ˈhævənt',
  "hasn't":'ˈhæzənt',"hadn't":'ˈhædənt',"isn't":'ˈɪzənt',
  "aren't":'ɑːrnt',"wasn't":'ˈwɑːzənt',"weren't":'wɜːrnt',
  "let's":'lɛts',"who's":'huːz',"how's":'haʊz',"it'll":'ˈɪtəl',
};

/* ———————————— Voice Loading ———————————— */
function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(opt);
    }
  });
  const samIdx = allVoices.findIndex(v => v.name.includes('Samantha') && v.lang.includes('en-US'));
  if (samIdx !== -1) voiceSelect.value = samIdx;
}
function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* ———————————— Sentence Splitting (unchanged) ———————————— */
function splitIntoRealSentences(text) {
  const s = text.replace(/\s+/g, ' ').trim();
  let t = s.replace(/(\d):(\d)/g, '$1⏱$2');
  const protectPatterns = [
    /\b([A-Z])\.([A-Z])\.([A-Z])\./gi,
    /\b([A-Z])\.([A-Z])\./gi,
    /\b[a-z]\.[a-z]\./gi,
    /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi
  ];
  protectPatterns.forEach(re => { t = t.replace(re, m => m.replace(/\./g, '•')); });
  const parts = t.split(/(?<=[.!?])\s+/);
  return parts.map(p => p.replace(/⏱/g, ':').replace(/•/g, '.').trim()).filter(Boolean);
}

/* ———————————— Go Button ———————————— */
goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (!text) return;
  stopSpeaking();
  const sentences = splitIntoRealSentences(text);
  renderResult(sentences);
});

/* ———————————— Title: Read All Sequentially ———————————— */
titleEl.addEventListener('click', () => {
  if (isReadingAll || window.speechSynthesis.speaking) {
    stopSpeaking();
    return;
  }
  const divs = Array.from(document.querySelectorAll('.sentence'));
  if (divs.length === 0) {
    const text = inputArea.value.trim();
    if (!text) return;
    const sentences = splitIntoRealSentences(text);
    renderResult(sentences);
    setTimeout(startReadAll, 60);
    return;
  }
  startReadAll();
});

function startReadAll() {
  readAllDivs = Array.from(document.querySelectorAll('.sentence'));
  if (!readAllDivs.length) return;
  isReadingAll = true;
  titleEl.classList.add('reading');
  titleHint.textContent = '⏸ 正在朗读… 点击停止';
  clearHighlights();
  readSentenceAt(0);
}

function readSentenceAt(index) {
  if (!isReadingAll) return;
  if (index >= readAllDivs.length) {
    isReadingAll = false;
    titleEl.classList.remove('reading');
    titleHint.textContent = '▶ 点击标题朗读全文 · 再次点击停止';
    clearHighlights();
    return;
  }
  const sentEl = readAllDivs[index];
  const text = sentEl.getAttribute('data-text');
  clearHighlights();
  sentEl.classList.add('active');
  sentEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;

  u.onend = () => {
    if (!isReadingAll) return;
    sentEl.classList.remove('active');
    setTimeout(() => readSentenceAt(index + 1), 220);
  };
  u.onerror = (e) => {
    if (!isReadingAll) return;
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    sentEl.classList.remove('active');
    setTimeout(() => readSentenceAt(index + 1), 300);
  };

  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

/* ———————————— Render Result ———————————— */
function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach(seg => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';
    sentenceDiv.setAttribute('data-text', seg);

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = '🔊';

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'words-container';

    const tokens = seg.split(/\s+/).filter(Boolean);
    tokens.forEach(token => {
      const wordOnly = token.replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g, '').toLowerCase();
      const ipa = ipaDict[wordOnly] || '';

      const unit = document.createElement('span');
      unit.className = 'word-unit';

      const wText = document.createElement('span');
      wText.className = 'word-text';
      wText.textContent = token;
      wText.addEventListener('click', (e) => {
        e.stopPropagation();
        speakWord(wordOnly || token, wText);
      });

      const wIPA = document.createElement('span');
      wIPA.className = 'word-ipa';
      wIPA.textContent = ipa;

      unit.appendChild(wText);
      unit.appendChild(wIPA);
      wordsDiv.appendChild(unit);
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    sentenceDiv.addEventListener('click', () => speakSentence(seg, sentenceDiv));
    result.appendChild(sentenceDiv);
  });
}

/* ———————————— Speaking Helpers ———————————— */
function speakSentence(text, sentenceEl) {
  stopSpeaking();
  clearHighlights();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakWord(word, wordEl) {
  stopSpeaking();
  clearHighlights();
  wordEl.classList.add('active');
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function stopSpeaking() {
  isReadingAll = false;
  titleEl.classList.remove('reading');
  titleHint.textContent = '▶ 点击标题朗读全文 · 再次点击停止';
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
  }
  clearHighlights();
}

function clearHighlights() {
  document.querySelectorAll('.sentence.active, .word-text.active')
    .forEach(el => el.classList.remove('active'));
}
</script>
