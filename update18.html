<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="shortcut icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
<link rel="icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
<title>English Reader</title>
<style>
/* (样式部分与之前完全一致，为节省篇幅在此折叠，实际使用时需包含全部CSS) */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
body { background: #f7f8fa; padding: 20px; max-width: 800px; margin: 0 auto; position: relative; padding-bottom: 20px; }
.title { text-align: center; font-size: 32px; font-weight: bold; color: #2c3e50; margin: 30px 0 20px; cursor: pointer; }
#voiceSelect { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; background: #fff; outline: none; }
#inputArea { width: 100%; height: 180px; padding: 15px; font-size: 17px; line-height: 1.5; border: 1px solid #ddd; border-radius: 12px; resize: vertical; outline: none; background: white; color: #333; }
#inputArea::placeholder { color: #888; opacity: 1; font-size: 16px; }
#goBtn { width: 100%; padding: 14px; font-size: 18px; font-weight: 600; background: #007aff; color: white; border: none; border-radius: 12px; margin: 12px 0 12px; cursor: pointer; }
#wordCount { text-align: center; font-size: 16px; color: #666; margin-bottom: 10px; min-height: 24px; }
#navHistory { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; gap: 8px; }
.history-arrows { display: flex; justify-content: center; align-items: center; gap: 20px; }
.history-arrow { font-size: 24px; cursor: pointer; color: #007aff; user-select: none; transition: opacity 0.2s; }
.history-arrow:hover { opacity: 0.8; }
.history-arrow.disabled { color: #007aff; opacity: 0.5; cursor: not-allowed; }
#historyTime { font-size: 13px; color: #888; text-align: center; min-height: 20px; }
#result { line-height: 1.8; font-size: 18px; }
.sentence { display: flex; align-items: center; padding: 14px 12px; border-radius: 10px; margin-bottom: 10px; background: #fff; border: 1px solid #eee; transition: background 0.2s; cursor: pointer; user-select: none; }
.sentence.active { background: #e1f5fe; border-color: #007aff; }
.speaker { margin-right: 12px; font-size: 24px; user-select: none; flex-shrink: 0; }
.word { display: inline-block; padding: 2px 4px; border-radius: 4px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.word.active { background: #ffeb3b; font-weight: 500; }
/* 生词收集区样式 */
#collectedWordsContainer { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
#collectedWordsContainer h3 { color: #2c3e50; margin-bottom: 15px; font-size: 20px; display: flex; align-items: center; gap: 8px; }
#collectedWordsList { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; min-height: 40px; }
.word-tag { display: inline-flex; align-items: center; background: #e3f2fd; color: #1565c0; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 500; user-select: none; transition: all 0.2s; border: 1px solid #bbdefb; }
.word-tag:hover { background: #bbdefb; transform: translateY(-2px); }
.word-tag-remove { margin-left: 8px; cursor: pointer; width: 18px; height: 18px; border-radius: 50%; background: #1565c0; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; opacity: 0.7; transition: opacity 0.2s; }
.word-tag-remove:hover { opacity: 1; background: #0d47a1; }
#emptyWordsTip { color: #888; font-style: italic; padding: 20px; text-align: center; background: #f9f9f9; border-radius: 10px; border: 1px dashed #ddd; }
/* 浮动添加按钮样式 */
#floatingAddWordBtn {
  position: fixed;
  width: 44px;
  height: 44px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  z-index: 10000;
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
  cursor: pointer;
  user-select: none;
  pointer-events: auto;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: floatIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes floatIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
#floatingAddWordBtn:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0, 122, 255, 0.5); }
#floatingAddWordBtn:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
/* 垃圾箱按钮、返回顶部按钮及响应式样式与之前一致，此处省略 */
.trash-btn { position: fixed; bottom: 30px; width: 60px; height: 60px; border-radius: 50%; background: #007aff; color: white; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4); transition: all 0.3s; user-select: none; z-index: 99; opacity: 0; visibility: hidden; transform: translateY(20px); }
.trash-btn.show { opacity: 0.9; visibility: visible; transform: translateY(0); }
.trash-btn:hover { opacity: 1; transform: translateY(0) scale(1.08); box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5); }
.trash-btn:active { transform: translateY(0) scale(0.95); box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3); }
.trash-btn.pressed { background: #ff3b30; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.5); }
#trashBtnLeft { left: 60px; }
#trashBtnRight { right: 60px; }
#backToTopBtn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: #007aff; color: white; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4); transition: all 0.3s; z-index: 100; opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(20px); }
#backToTopBtn.show { opacity: 0.9; visibility: visible; transform: translateX(-50%) translateY(0); }
#backToTopBtn:hover { opacity: 1; transform: translateX(-50%) scale(1.08); box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5); }
@media (max-width: 768px) {
  .trash-btn { width: 55px; height: 55px; font-size: 24px; bottom: 25px; }
  #trashBtnLeft { left: 40px; } #trashBtnRight { right: 40px; }
  #inputArea { font-size: 16px; }
  #floatingAddWordBtn { width: 40px; height: 40px; font-size: 20px; }
}
@media (max-width: 480px) {
  .trash-btn { width: 50px; height: 50px; font-size: 22px; bottom: 20px; }
  #trashBtnLeft { left: 30px; } #trashBtnRight { right: 30px; }
  #inputArea { font-size: 16px; height: 160px; }
  #inputArea::placeholder { font-size: 15px; }
  #floatingAddWordBtn { width: 36px; height: 36px; font-size: 18px; }
}
</style>
</head>
<body>
  <div class="title">English Reader</div>
  <select id="voiceSelect"></select>
  <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
  <button id="goBtn">Go</button>
  <div id="wordCount"></div>
  <div id="navHistory" style="display: none;">
    <div class="history-arrows">
      <span id="prevHistory" class="history-arrow">&#9664;&#xFE0E;</span>
      <span id="nextHistory" class="history-arrow">&#9654;&#xFE0E;</span>
    </div>
    <div id="historyTime"></div>
  </div>
  <div id="result"></div>
  <!-- 生词收集区 -->
  <div id="collectedWordsContainer" style="display: none;">
    <h3>📖 Collected Words</h3>
    <div id="collectedWordsList"></div>
    <div id="emptyWordsTip">No words collected yet. Long-press a word in the result to add it here.</div>
  </div>
  <!-- 垃圾箱按钮 -->
  <button id="trashBtnLeft" class="trash-btn" title="Hold this button and the right button to delete current record">🗑️</button>
  <button id="trashBtnRight" class="trash-btn" title="Hold this button and the left button to delete current record">🗑️</button>
  <button id="backToTopBtn" title="Back to result">↑</button>

<script>
// 元素获取
const inputArea = document.getElementById('inputArea');
const goBtn = document.getElementById('goBtn');
const result = document.getElementById('result');
const voiceSelect = document.getElementById('voiceSelect');
const titleEl = document.querySelector('.title');
const wordCountEl = document.getElementById('wordCount');
const navHistoryEl = document.getElementById('navHistory');
const prevHistoryBtn = document.getElementById('prevHistory');
const nextHistoryBtn = document.getElementById('nextHistory');
const historyTimeEl = document.getElementById('historyTime');
const backToTopBtn = document.getElementById('backToTopBtn');
const trashBtnLeft = document.getElementById('trashBtnLeft');
const trashBtnRight = document.getElementById('trashBtnRight');
const collectedWordsContainer = document.getElementById('collectedWordsContainer');
const collectedWordsList = document.getElementById('collectedWordsList');
const emptyWordsTip = document.getElementById('emptyWordsTip');

let allVoices = [];
let currentUtterance = null;
let historyIndex = -1;
let historyList = [];
const HISTORY_STORAGE_KEY = 'englishReaderHistory';
const CURRENT_INDEX_KEY = 'englishReaderCurrentIndex';

let leftTrashPressed = false;
let rightTrashPressed = false;
let deleteInProgress = false;

// 长按相关变量
let longPressTimer = null;
let currentLongPressWord = null;
let currentLongPressWordText = '';

// ==================== 修复1: 生词模块显示逻辑 ====================
// 初始化时显示容器，但通过内容控制内部元素的显示
function initCollectedWordsContainer() {
  // 确保容器本身是显示的，由内部条件控制内容
  collectedWordsContainer.style.display = 'block';
  // 初始状态显示提示
  collectedWordsList.innerHTML = '';
  emptyWordsTip.style.display = 'block';
}

// ==================== 修复2: 浮动按钮逻辑（不阻止系统菜单） ====================
function bindWordEvents(wordElement) {
  const wordText = wordElement.textContent.trim();
  
  wordElement.addEventListener('touchstart', function(e) {
    // 重要：不阻止默认行为，不停止冒泡，以保证系统菜单能正常触发
    currentLongPressWord = this;
    currentLongPressWordText = wordText;
    const touch = e.touches[0];
    
    longPressTimer = setTimeout(() => {
      // 在长按后显示按钮，但系统菜单也会触发
      showAddWordButton(this, wordText, touch.clientX, touch.clientY);
    }, 600); // 稍微延长一点时间，确保系统菜单流程已开始
  }, { passive: true }); // 使用 passive 提高滚动性能
  
  wordElement.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }, { passive: true });
  
  wordElement.addEventListener('touchmove', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
    removeFloatingButton();
  }, { passive: true });
  
  // 桌面端支持
  wordElement.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    currentLongPressWord = this;
    currentLongPressWordText = wordText;
    
    longPressTimer = setTimeout(() => {
      showAddWordButton(this, wordText, e.clientX, e.clientY);
    }, 600);
  });
  
  wordElement.addEventListener('mouseup', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  });
  
  wordElement.addEventListener('mouseleave', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  });
}

// 修复3: 浮动按钮定位（正上方100像素）
function showAddWordButton(wordElement, wordText, clientX, clientY) {
  removeFloatingButton();
  
  const btn = document.createElement('div');
  btn.id = 'floatingAddWordBtn';
  btn.innerHTML = '+';
  btn.title = 'Add to Collection';
  
  // 核心修改：计算单词在页面中的位置，将按钮置于其正上方100像素处
  const wordRect = wordElement.getBoundingClientRect();
  const btnSize = 44;
  const verticalDistance = 100; // 正上方100像素
  
  // 计算目标位置：单词的水平中心，垂直方向向上偏移
  let targetX = wordRect.left + (wordRect.width / 2) - (btnSize / 2);
  let targetY = wordRect.top - verticalDistance;
  
  // 边界检查：确保按钮完全在可视区域内
  const viewportWidth = window.innerWidth;
  const viewportHeight = window.innerHeight;
  const margin = 5;
  
  if (targetX < margin) targetX = margin;
  if (targetX + btnSize > viewportWidth - margin) targetX = viewportWidth - btnSize - margin;
  if (targetY < margin) targetY = wordRect.bottom + margin; // 如果上方空间不够，放到单词下方
  
  btn.style.left = `${targetX}px`;
  btn.style.top = `${targetY}px`;
  
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    addWordToCurrentCollection(wordText);
    removeFloatingButton();
  });
  
  document.body.appendChild(btn);
  setupAutoRemove(btn);
}

function setupAutoRemove(button) {
  const removeButton = () => {
    if (button && button.parentNode) button.remove();
  };
  // 短时间后自动移除
  const autoRemoveTimer = setTimeout(removeButton, 2000);
  // 点击页面其他部分、滚动、或开始新触摸时移除
  const removeOnInteraction = () => {
    clearTimeout(autoRemoveTimer);
    removeButton();
    document.removeEventListener('touchstart', removeOnInteraction);
    window.removeEventListener('scroll', removeOnInteraction);
  };
  document.addEventListener('touchstart', removeOnInteraction, { once: true, passive: true });
  window.addEventListener('scroll', removeOnInteraction, { once: true, passive: true });
}

function removeFloatingButton() {
  const btn = document.getElementById('floatingAddWordBtn');
  if (btn && btn.parentNode) btn.remove();
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

// ==================== 生词收集核心功能 ====================
function addWordToCurrentCollection(word) {
  if (!word || historyIndex === -1 || historyIndex >= historyList.length) return;
  const currentRecord = historyList[historyIndex];
  if (!currentRecord.collectedWords) currentRecord.collectedWords = [];
  if (!currentRecord.collectedWords.includes(word)) {
    currentRecord.collectedWords.push(word);
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
    renderCollectedWords(currentRecord.collectedWords);
  }
}

function removeWordFromCurrentCollection(word) {
  if (historyIndex === -1 || historyIndex >= historyList.length) return;
  const currentRecord = historyList[historyIndex];
  if (!currentRecord.collectedWords) return;
  const index = currentRecord.collectedWords.indexOf(word);
  if (index > -1) {
    currentRecord.collectedWords.splice(index, 1);
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
    renderCollectedWords(currentRecord.collectedWords);
  }
}

// 修复生词列表渲染逻辑
function renderCollectedWords(words) {
  if (!words || words.length === 0) {
    collectedWordsList.innerHTML = '';
    emptyWordsTip.style.display = 'block';
    // 容器保持显示，但内容为空提示
    collectedWordsContainer.style.display = 'block';
    return;
  }
  
  collectedWordsList.innerHTML = '';
  emptyWordsTip.style.display = 'none';
  collectedWordsContainer.style.display = 'block';
  
  words.forEach(word => {
    const wordTag = document.createElement('div');
    wordTag.className = 'word-tag';
    wordTag.innerHTML = `${word}<span class="word-tag-remove" data-word="${word}">×</span>`;
    
    wordTag.querySelector('.word-tag-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      removeWordFromCurrentCollection(word);
    });
    
    wordTag.addEventListener('click', (e) => {
      if (!e.target.classList.contains('word-tag-remove')) {
        speakWord(word, wordTag);
      }
    });
    
    collectedWordsList.appendChild(wordTag);
  });
}

// ==================== 历史记录与核心功能（已修正集成点） ====================
function saveCurrentState() {
  localStorage.setItem(CURRENT_INDEX_KEY, historyIndex.toString());
}

function initPageWithLastResult() {
  loadHistoryFromStorage();
  // 初始化生词容器
  initCollectedWordsContainer();
  
  if (historyList.length > 0 && historyIndex >= 0 && historyIndex < historyList.length) {
    const currentRecord = historyList[historyIndex];
    inputArea.value = '';
    processText(currentRecord.text, false);
    // 确保显示当前记录的生词
    if (currentRecord.collectedWords && currentRecord.collectedWords.length > 0) {
      renderCollectedWords(currentRecord.collectedWords);
    }
    updateHistoryNavButtons();
  } else if (historyList.length > 0 && historyIndex === -1) {
    historyIndex = historyList.length - 1;
    const lastRecord = historyList[historyIndex];
    inputArea.value = '';
    processText(lastRecord.text, false);
    if (lastRecord.collectedWords && lastRecord.collectedWords.length > 0) {
      renderCollectedWords(lastRecord.collectedWords);
    }
    updateHistoryNavButtons();
    saveCurrentState();
  }
}

// 修正 processText 函数中更新生词显示的逻辑
function processText(text, isNewRecord = true) {
  if (!text) return;
  const sentences = splitIntoRealSentences(text);
  const totalWords = sentences.reduce((sum, seg) => sum + seg.split(/\s+/).filter(Boolean).length, 0);
  renderResult(sentences);
  wordCountEl.textContent = `Total Words: ${totalWords}`;
  if (isNewRecord) {
    saveToHistory(text, totalWords);
  }
  // 关键修正：始终根据当前记录更新生词显示
  if (historyIndex >= 0 && historyIndex < historyList.length) {
    const currentRecord = historyList[historyIndex];
    renderCollectedWords(currentRecord.collectedWords || []);
  }
  scrollToResult();
}

// 修正 navigateHistory 函数
function navigateHistory(direction) {
  if (direction === 'prev' && historyIndex > 0) {
    historyIndex--;
  } else if (direction === 'next' && historyIndex < historyList.length - 1) {
    historyIndex++;
  } else {
    return;
  }
  const record = historyList[historyIndex];
  inputArea.value = '';
  processText(record.text, false);
  updateHistoryNavButtons();
  saveCurrentState();
}

// ==================== 其余原有功能（保持不变） ====================
// 包括：防熄屏、垃圾箱按钮、历史记录存储、语音合成、句子分割与渲染等函数
// 由于篇幅限制，以下仅列出函数名，其内部实现与上一版本一致
function isAtBottom() { /* ... */ }
function updateButtonVisibility() { /* ... */ }
async function requestWakeLock() { /* ... */ }
function setupTrashButtons() { /* ... */ }
function checkBothTrashPressed() { /* ... */ }
function clearTrashPressStates() { /* ... */ }
function deleteCurrentRecord() { /* ... */ }
function formatDateTime(timestamp) { /* ... */ }
function loadHistoryFromStorage() { /* ... */ }
function saveToHistory(text, count) { /* ... */ }
function updateHistoryNavButtons() { /* ... */ }
function scrollToResult() { /* ... */ }
function initializePage() { /* ... */ }
function loadVoices() { /* ... */ }
function getSelectedVoice() { /* ... */ }
function splitIntoRealSentences(text) { /* ... */ }
function renderResult(segments) { /* ... */ }
function speakSentence(text, sentenceEl) { /* ... */ }
function speakWord(word, wordEl) { /* ... */ }
function stopSpeaking() { /* ... */ }

// 事件监听
window.addEventListener('load', initializePage);
window.speechSynthesis.onvoiceschanged = loadVoices;
goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (text) { processText(text, true); inputArea.value = ''; }
});
prevHistoryBtn.addEventListener('click', () => navigateHistory('prev'));
nextHistoryBtn.addEventListener('click', () => navigateHistory('next'));
backToTopBtn.addEventListener('click', scrollToResult);
window.addEventListener('scroll', updateButtonVisibility);
titleEl.addEventListener('click', () => { /* 标题点击朗读逻辑 */ });

// 初始化防熄屏
window.addEventListener('load', requestWakeLock);
document.addEventListener('visibilitychange', () => {
  if (wakeLock && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
</script>
</body>
</html>
